services:
  postgres:
    image: postgres:16-alpine
    container_name: catalog-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: catalog-libretranslate
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: en,ru,de,fr,es,it,pt,tr,uk,zh
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/languages').read()\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
    ports:
      - "5000:5000"
    volumes:
      - libretranslate_data:/home/libretranslate/.local

  backend:
    build:
      context: ./backend
    container_name: catalog-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      libretranslate:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "8080:8080"

volumes:
  catalog_postgres_data:
  libretranslate_data:
