services:
  postgres:
    image: postgres:16-alpine
    container_name: catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: catalog-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: postgresql://catalog:catalog@postgres:5432/catalog
      DUMMYJSON_BASE_URL: https://dummyjson.com
      YANDEX_TRANSLATE_API_URL: https://translate.api.cloud.yandex.net/translate/v2/translate
      YANDEX_TRANSLATE_API_KEY: ${YANDEX_TRANSLATE_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
    ports:
      - "8080:8080"

volumes:
  catalog_postgres_data:
