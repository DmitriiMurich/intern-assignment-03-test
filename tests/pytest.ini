[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -v
    --cov-report=term-missing
    --cov-report=json:tests/pipeline/coverage-report.json

markers =
    unit: Unit tests — no external dependencies, all I/O mocked (ISTQB: component testing)
    api: API tests — require a running backend server (ISTQB: integration testing)
    ui: Legacy alias for e2e marker (kept for backwards compatibility)
    e2e: Backend E2E/smoke tests — require the full running stack (ISTQB: system testing)
    smoke: Critical-path smoke suite (ISTQB: smoke/sanity testing)
    positive: Happy-path cases using valid equivalence partitions (ISTQB: EP)
    negative: Error-path cases using invalid equivalence partitions (ISTQB: EP)
    boundary: Boundary value analysis cases (ISTQB: BVA)
    regression: Regression suite — guards against known-fixed defects

filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
